server.port=8080
spring.application.name=api-gateway

# EUREKA
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# GATEWAY ROUTES
spring.cloud.gateway.server.webflux.routes[0].id=product-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/products/**

spring.cloud.gateway.server.webflux.routes[1].id=supplier-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://SUPPLIER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/suppliers/**

spring.cloud.gateway.server.webflux.routes[2].id=supplier-products
spring.cloud.gateway.server.webflux.routes[2].uri=lb://SUPPLIER-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/supplier-products/**

spring.cloud.gateway.server.webflux.routes[3].id=supply-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://SUPPLY-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/supply-orders/**